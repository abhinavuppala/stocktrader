# Default application configuration
# Override locally with config.local.yaml (gitignored) or environment variables

app:
  env: development
  log_level: INFO

portfolio:
  initial_cash: 100000.0          # USD
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
  rebalance_interval_seconds: 3600  # 1 hour

risk:
  max_position_pct: 0.25          # max 25% in any single ticker
  max_delta_pct: 0.10             # max 10% change per rebalance cycle
  min_cash_pct: 0.05              # always keep 5% as cash
  max_daily_trades: 20

broker:
  mode: mock                      # mock | alpaca
  slippage_bps: 10                # 0.10% slippage simulation

nlp:
  sentiment_window_hours: 24      # look back window for news aggregation
  min_articles_for_signal: 2      # ignore sentiment with fewer articles

data:
  price_history_days: 30          # default lookback for price data
  news_poll_interval_seconds: 300 # 5 minutes
